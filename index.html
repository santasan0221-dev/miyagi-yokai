<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>宮城妖怪図鑑</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique&family=Kaisei+Decol:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#e8f0e0; --paper:#faf7ee; --ink:#1a1208;
    --red:#c0392b; --gold:#c9902a; --green-dark:#2d5016;
    --green-mid:#4a7c2f; --cream:#f5edda; --shadow:rgba(26,18,8,0.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'M PLUS Rounded 1c',sans-serif;background:var(--bg);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;overflow-x:hidden;
    background-image:radial-gradient(ellipse at 20% 10%,rgba(74,124,47,0.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(201,144,42,0.12) 0%,transparent 50%);}
  .wrapper{width:100%;max-width:420px;min-height:100vh;display:flex;flex-direction:column;padding:0 0 28px;}

  /* HEADER */
  .header{background:var(--green-dark);padding:16px 20px 12px;text-align:center;position:relative;overflow:hidden;box-shadow:0 4px 12px var(--shadow);}
  .header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,0.03) 8px,rgba(255,255,255,0.03) 16px);}
  .title-en{font-family:'Zen Antique',serif;color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:3px;}
  .title-jp{font-family:'Kaisei Decol',serif;color:var(--cream);font-size:28px;font-weight:700;text-shadow:0 2px 0 rgba(0,0,0,0.4),0 0 20px rgba(201,144,42,0.6);letter-spacing:2px;}
  .title-deco{color:var(--gold);font-size:12px;letter-spacing:1px;margin-top:3px;}

  /* PROGRESS */
  .progress-section{background:var(--green-mid);padding:8px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 6px var(--shadow);}
  .progress-label{font-family:'Kaisei Decol',serif;color:var(--cream);font-size:11px;white-space:nowrap;}
  .progress-bar-wrap{flex:1;background:rgba(0,0,0,0.3);border-radius:99px;height:9px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),#f5c842);border-radius:99px;transition:width 0.6s cubic-bezier(.34,1.56,.64,1);width:0%;}
  .progress-count{font-family:'Kaisei Decol',serif;color:var(--gold);font-size:13px;font-weight:700;min-width:48px;text-align:right;}

  /* TICKET BAR */
  .ticket-bar{background:#1e3a0e;padding:7px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .ticket-label{font-size:11px;color:rgba(245,237,218,0.75);font-weight:700;white-space:nowrap;}
  .ticket-icons{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;}
  .ticket-icon{font-size:13px;transition:all 0.3s;filter:none;}
  .ticket-icon.used{filter:grayscale(1) opacity(0.3);}
  .ticket-countdown{font-size:11px;color:var(--gold);font-weight:700;font-family:'Kaisei Decol',serif;white-space:nowrap;}

  /* STAGE */
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;padding:12px 12px 0;gap:10px;}

  /* CARD */
  .card-scene{width:100%;perspective:1000px;}
  .card{width:100%;background:var(--paper);border-radius:20px;border:3px solid var(--ink);box-shadow:5px 5px 0px var(--ink),0 8px 30px var(--shadow);overflow:hidden;position:relative;transform-origin:center;min-height:270px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .card-stripe{position:absolute;top:0;left:0;right:0;height:6px;background:var(--green-dark);transition:background 0.3s;}
  .card.rarity-5 .card-stripe{background:linear-gradient(90deg,#c9902a,#f5c842,#c9902a);}
  .card.rarity-4 .card-stripe{background:linear-gradient(90deg,#8b5cf6,#a78bfa,#8b5cf6);}
  .card.rarity-3 .card-stripe{background:linear-gradient(90deg,#e67e22,#f39c12,#e67e22);}
  .card.rarity-2 .card-stripe{background:linear-gradient(90deg,#4a7c2f,#7ec850,#4a7c2f);}
  .card.rarity-1 .card-stripe{background:linear-gradient(90deg,#6b7280,#9ca3af,#6b7280);}
  .card-idle-content{display:flex;flex-direction:column;align-items:center;gap:10px;padding:30px 20px;}
  .card-idle-icon{font-size:64px;opacity:0.18;animation:float 3s ease-in-out infinite;}
  .card-idle-text{font-family:'Kaisei Decol',serif;color:rgba(26,18,8,0.25);font-size:14px;text-align:center;line-height:1.6;}
  .card-yokai-content{display:none;flex-direction:column;align-items:center;padding:16px 18px 20px;width:100%;}
  .card-yokai-content.visible{display:flex;}
  .yokai-avatar{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:56px;background:var(--bg);border:3px solid var(--ink);box-shadow:3px 3px 0 var(--ink);margin-bottom:10px;position:relative;overflow:visible;}
  .yokai-avatar .new-badge{position:absolute;top:-8px;right:-8px;background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:99px;border:2px solid var(--ink);letter-spacing:1px;animation:badgePop 0.4s cubic-bezier(.34,1.56,.64,1) forwards;transform:scale(0);}
  .card.rarity-5 .yokai-avatar{box-shadow:3px 3px 0 var(--ink),0 0 22px rgba(201,144,42,0.7);}
  .card.rarity-4 .yokai-avatar{box-shadow:3px 3px 0 var(--ink),0 0 18px rgba(139,92,246,0.6);}
  .card.rarity-3 .yokai-avatar{box-shadow:3px 3px 0 var(--ink),0 0 14px rgba(230,126,34,0.55);}
  .yokai-name{font-family:'Kaisei Decol',serif;font-size:21px;font-weight:700;color:var(--ink);letter-spacing:1px;text-align:center;margin-bottom:4px;}
  .yokai-rarity{font-size:19px;margin-bottom:7px;letter-spacing:2px;line-height:1;}
  .yokai-divider{width:80%;height:2px;background:repeating-linear-gradient(90deg,var(--ink) 0,var(--ink) 4px,transparent 4px,transparent 8px);margin-bottom:9px;opacity:0.2;}
  .yokai-feature-label{font-size:9px;color:var(--green-mid);letter-spacing:2px;font-weight:700;margin-bottom:3px;}
  .yokai-feature{font-size:11px;color:rgba(26,18,8,0.7);text-align:center;line-height:1.7;padding:0 6px;white-space:pre-line;}

  /* TABS + COLLECTION */
  .collection-wrap{width:100%;}
  .tab-bar{display:flex;background:rgba(255,255,255,0.45);border:2px solid rgba(26,18,8,0.12);border-radius:12px 12px 0 0;overflow:hidden;}
  .tab-btn{flex:1;padding:6px 2px;border:none;background:transparent;font-family:'M PLUS Rounded 1c',sans-serif;font-size:9.5px;font-weight:700;color:rgba(26,18,8,0.38);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
  .tab-btn.active{color:var(--green-dark);border-bottom-color:var(--green-dark);background:rgba(255,255,255,0.65);}
  .collection-section{background:rgba(255,255,255,0.4);border:2px solid rgba(26,18,8,0.12);border-top:none;border-radius:0 0 12px 12px;padding:8px 8px 10px;max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .rarity-legend{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:7px;}
  .legend-item{display:flex;align-items:center;gap:3px;font-size:8px;color:rgba(26,18,8,0.5);font-weight:700;}
  .legend-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid rgba(26,18,8,0.25);}
  .collection-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;}
  .collection-item{aspect-ratio:1;background:rgba(26,18,8,0.05);border:2px dashed rgba(26,18,8,0.15);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:all 0.3s cubic-bezier(.34,1.56,.64,1);}
  .collection-item.found{background:var(--paper);border:2px solid var(--ink);box-shadow:2px 2px 0 var(--ink);}
  .collection-item.found.r5{border-color:#c9902a;box-shadow:2px 2px 0 #c9902a;}
  .collection-item.found.r4{border-color:#8b5cf6;box-shadow:2px 2px 0 #8b5cf6;}
  .collection-item.found.r3{border-color:#e67e22;box-shadow:2px 2px 0 #e67e22;}
  .collection-item.found.r2{border-color:#4a7c2f;box-shadow:2px 2px 0 #4a7c2f;}
  .col-emoji{font-size:17px;filter:grayscale(1) opacity(0.18);transition:filter 0.3s;}
  .collection-item.found .col-emoji{filter:none;}
  .col-name{font-size:5.5px;color:rgba(26,18,8,0.24);text-align:center;font-weight:700;line-height:1.2;padding:0 1px;transition:color 0.3s;}
  .collection-item.found .col-name{color:var(--ink);}
  .col-stars{font-size:5px;opacity:0;transition:opacity 0.3s;}
  .collection-item.found .col-stars{opacity:1;}

  /* BUTTON */
  .btn-section{padding:12px 12px 0;}
  .gacha-btn{width:100%;background:linear-gradient(145deg,#2d5016,#4a7c2f);color:var(--cream);border:3px solid var(--ink);border-radius:16px;padding:16px;font-family:'Kaisei Decol',serif;font-size:21px;font-weight:700;letter-spacing:3px;cursor:pointer;box-shadow:4px 4px 0 var(--ink);display:flex;align-items:center;justify-content:center;gap:10px;user-select:none;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;transition:all 0.1s;}
  .gacha-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
  .gacha-btn:disabled{background:linear-gradient(145deg,#444,#666);cursor:not-allowed;box-shadow:2px 2px 0 #333;opacity:0.7;}
  .btn-icon{font-size:22px;}
  .btn-sub{font-size:11px;opacity:0.7;font-family:'M PLUS Rounded 1c',sans-serif;letter-spacing:0;}

  /* ALL FOUND BANNER */
  .all-found-banner{display:none;background:linear-gradient(135deg,var(--gold),#f5c842);border:3px solid var(--ink);border-radius:14px;box-shadow:4px 4px 0 var(--ink);padding:10px 14px;text-align:center;animation:bannerDrop 0.6s cubic-bezier(.34,1.36,.64,1) forwards;}
  .all-found-banner.visible{display:block;}
  .banner-title{font-family:'Kaisei Decol',serif;font-size:16px;color:var(--ink);font-weight:700;letter-spacing:1px;}
  .banner-sub{font-size:10px;color:rgba(26,18,8,0.6);margin-top:2px;}

  /* ANIMATIONS */
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes badgePop{to{transform:scale(1)}}
  @keyframes cardReveal{0%{transform:scale(0.72) rotateY(90deg);opacity:0}60%{transform:scale(1.04) rotateY(-5deg);opacity:1}80%{transform:scale(0.98) rotateY(2deg)}100%{transform:scale(1) rotateY(0);opacity:1}}
  @keyframes btnPulse{0%{transform:scale(1)}30%{transform:scale(0.93)}60%{transform:scale(1.05)}100%{transform:scale(1)}}
  @keyframes shimmer{0%{left:-100%}100%{left:200%}}
  @keyframes starsBurst{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.1) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
  @keyframes collectionPop{0%{transform:scale(0.5) rotate(-10deg)}70%{transform:scale(1.15) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
  @keyframes particleFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
  @keyframes bannerDrop{0%{transform:translateY(-60px);opacity:0}60%{transform:translateY(6px);opacity:1}100%{transform:translateY(0);opacity:1}}
  @keyframes tickShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

  .card.animating{animation:cardReveal 0.55s cubic-bezier(.34,1.36,.64,1) forwards;}
  .gacha-btn.pulsing{animation:btnPulse 0.4s ease forwards;}
  .shimmer-bar{position:absolute;top:0;left:-100%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);animation:shimmer 0.6s ease forwards;pointer-events:none;}
  .yokai-rarity.animate{animation:starsBurst 0.5s 0.2s cubic-bezier(.34,1.56,.64,1) both;}
  .particle{position:fixed;pointer-events:none;z-index:999;border-radius:50%;animation:particleFly 0.8s ease-out forwards;}
  .ticket-bar.shake{animation:tickShake 0.4s ease;}

  @supports (padding-bottom:env(safe-area-inset-bottom)){.btn-section{padding-bottom:calc(14px + env(safe-area-inset-bottom));}}

  /* ── SSR OVERLAY ── */
  .ssr-overlay{position:fixed;inset:0;z-index:1000;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;}
  .ssr-flash{position:absolute;inset:0;background:radial-gradient(ellipse at center,#fffbe0 0%,#ffd700 40%,#c9902a 100%);opacity:0;animation:ssrFlash 1.2s ease forwards;}
  .ssr-text{font-family:'Kaisei Decol',serif;font-size:28px;font-weight:700;color:#1a1208;text-shadow:0 0 20px #ffd700,0 2px 0 rgba(0,0,0,0.3);letter-spacing:3px;opacity:0;transform:scale(0.5) translateY(-30px);animation:ssrTextAnim 1.2s 0.2s cubic-bezier(.34,1.56,.64,1) forwards;text-align:center;line-height:1.5;z-index:1;padding:20px;}
  .ssr-subtext{font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;color:#1a1208;opacity:0;animation:ssrSubAnim 0.6s 0.6s ease forwards;z-index:1;letter-spacing:2px;}
  @keyframes ssrFlash{0%{opacity:0}20%{opacity:0.92}60%{opacity:0.75}100%{opacity:0}}
  @keyframes ssrTextAnim{0%{opacity:0;transform:scale(0.5) translateY(-30px)}60%{opacity:1;transform:scale(1.08) translateY(0)}100%{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes ssrSubAnim{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes screenShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-8px)}20%{transform:translateX(8px)}30%{transform:translateX(-6px)}40%{transform:translateX(6px)}50%{transform:translateX(-4px)}60%{transform:translateX(4px)}70%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
  .wrapper.ssr-shake{animation:screenShake 0.6s ease;}

  /* ── COIN BAR ── */
  .coin-bar{background:#0f2008;padding:5px 16px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.06);}
  .coin-label{font-size:10px;color:rgba(245,237,218,0.6);font-weight:700;}
  .coin-display{display:flex;align-items:center;gap:6px;}
  .coin-icons-wrap{display:flex;gap:2px;}
  .coin-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.2);transition:all 0.3s cubic-bezier(.34,1.56,.64,1);}
  .coin-dot.filled{background:var(--gold);border-color:#f5c842;box-shadow:0 0 6px rgba(201,144,42,0.7);}
  .coin-count{font-family:'Kaisei Decol',serif;font-size:11px;color:var(--gold);font-weight:700;}
  .coin-hint{font-size:9px;color:rgba(245,237,218,0.4);letter-spacing:0.5px;}

  /* ── SHARE BUTTON ── */
  .share-row{display:flex;gap:8px;margin-top:12px;width:100%;justify-content:center;}
  .share-btn{flex:1;max-width:160px;background:#000;color:#fff;border:2px solid #000;border-radius:10px;padding:9px 12px;font-size:12px;font-weight:800;font-family:'M PLUS Rounded 1c',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;letter-spacing:0.5px;transition:all 0.12s;-webkit-tap-highlight-color:transparent;box-shadow:2px 2px 0 #333;}
  .share-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #333;}
  .share-btn .x-icon{font-size:13px;font-family:monospace;font-weight:900;}

  /* ── DUPLICATE TOAST ── */
  .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--ink);color:var(--cream);font-family:'Kaisei Decol',serif;font-size:15px;font-weight:700;padding:12px 24px;border-radius:12px;border:3px solid var(--gold);box-shadow:0 4px 20px rgba(0,0,0,0.4),4px 4px 0 var(--gold);z-index:2000;pointer-events:none;text-align:center;letter-spacing:1px;transition:none;}
  .toast.show{animation:toastPop 1.6s cubic-bezier(.34,1.56,.64,1) forwards;}
  @keyframes toastPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}15%{transform:translate(-50%,-50%) scale(1.1);opacity:1}25%{transform:translate(-50%,-50%) scale(1);opacity:1}75%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(0.8);opacity:0}}

  /* ── GUARANTEED BANNER ── */
  .guaranteed-badge{display:none;background:linear-gradient(135deg,#c9902a,#f5c842);border:2px solid var(--ink);border-radius:8px;padding:5px 12px;font-size:10px;font-weight:800;color:var(--ink);letter-spacing:1px;text-align:center;margin-top:4px;animation:badgePop 0.4s cubic-bezier(.34,1.56,.64,1) forwards;transform:scale(0);}
  .guaranteed-badge.visible{display:block;}
</style>
</head>
<body>
<div class="ssr-overlay" id="ssrOverlay" style="display:none">
  <div class="ssr-flash"></div>
  <div class="ssr-text" id="ssrText"></div>
  <div class="ssr-subtext">✦ 伝説の妖怪が現れた！ ✦</div>
</div>
<div class="toast" id="toast"></div>
<div class="wrapper">

  <header class="header">
    <div class="title-en">MIYAGI YOKAI ZUKAN</div>
    <div class="title-jp">宮城妖怪図鑑</div>
    <div class="title-deco">〜 みやぎの妖怪を集めよう 〜</div>
  </header>

  <div class="progress-section">
    <span class="progress-label">📜 発見した妖怪</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
    <span class="progress-count" id="progressCount">0 / 130</span>
  </div>

  <div class="ticket-bar" id="ticketBar">
    <span class="ticket-label">🔍 本日の探索</span>
    <div class="ticket-icons" id="ticketIcons"></div>
    <span class="ticket-countdown" id="ticketCountdown"></span>
  </div>
  <div class="coin-bar">
    <span class="coin-label">🪙 被り救済コイン</span>
    <div class="coin-display">
      <div class="coin-icons-wrap" id="coinDots"></div>
      <span class="coin-count" id="coinCount">0/10</span>
    </div>
    <span class="coin-hint" id="coinHint">10枚でレア確定</span>
  </div>

  <div class="stage">

    <div class="all-found-banner" id="allFoundBanner">
      <div class="banner-title">🎉 全130種コンプリート！ 🎉</div>
      <div class="banner-sub">宮城の妖怪をすべて発見した！引き続き探索できるよ♪</div>
    </div>

    <div class="card-scene">
      <div class="card idle" id="card">
        <div class="card-stripe"></div>
        <div class="card-idle-content" id="idleContent">
          <div class="card-idle-icon">🌿</div>
          <div class="card-idle-text">「探索する」ボタンを<br>タップして妖怪を発見しよう！</div>
        </div>
        <div class="card-yokai-content" id="yokaiContent">
          <div class="yokai-avatar" id="yokaiAvatar"><span id="yokaiEmoji"></span></div>
          <div class="yokai-name" id="yokaiName"></div>
          <div class="yokai-rarity" id="yokaiRarity"></div>
          <div class="yokai-divider"></div>
          <div class="yokai-feature-label">✦ とくちょう ✦</div>
          <div class="yokai-feature" id="yokaiFeature"></div>
          <div class="share-row">
            <button class="share-btn" onclick="shareResult()">
              <span class="x-icon">𝕏</span> シェアする
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="collection-wrap">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="showTab('all')">全部</button>
        <button class="tab-btn" onclick="showTab('r5')">★5伝説</button>
        <button class="tab-btn" onclick="showTab('r4')">★4激レア</button>
        <button class="tab-btn" onclick="showTab('r3')">★3レア</button>
        <button class="tab-btn" onclick="showTab('r12')">★2以下</button>
      </div>
      <div class="collection-section">
        <div class="rarity-legend">
          <span class="legend-item"><span class="legend-dot" style="background:#f5c842"></span>★5 伝説</span>
          <span class="legend-item"><span class="legend-dot" style="background:#a78bfa"></span>★4 激レア</span>
          <span class="legend-item"><span class="legend-dot" style="background:#f39c12"></span>★3 レア</span>
          <span class="legend-item"><span class="legend-dot" style="background:#7ec850"></span>★2 普通</span>
          <span class="legend-item"><span class="legend-dot" style="background:#9ca3af"></span>★1 よく出る</span>
        </div>
        <div class="collection-grid" id="collectionGrid"></div>
      </div>
    </div>

  </div>

  <div class="btn-section">
    <button class="gacha-btn" id="gachaBtn" onclick="doGacha()">
      <span class="btn-icon">🔍</span>
      <span id="btnLabel">探索する</span>
    </button>
  </div>

</div>

const TOTAL = YOKAI.length;
const found = new Set();
let isAnimating = false;
let currentYokai = null;

// ═══════════════════════════════════════════════
//  localStorage keys & constants
// ═══════════════════════════════════════════════
const MAX_TICKETS = 15;
const MAX_COINS   = 10;
const SK_DATE  = 'myg_date';
const SK_COUNT = 'myg_count';
const SK_FOUND = 'myg_found';
const SK_COINS = 'myg_coins';

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function loadState() {
  try {
    const today = getTodayStr();
    const savedFound = localStorage.getItem(SK_FOUND);
    if (savedFound) JSON.parse(savedFound).forEach(id => found.add(id));
    if (localStorage.getItem(SK_DATE) !== today) {
      localStorage.setItem(SK_DATE, today);
      localStorage.setItem(SK_COUNT, MAX_TICKETS);
      return MAX_TICKETS;
    }
    return parseInt(localStorage.getItem(SK_COUNT) || MAX_TICKETS);
  } catch(e) { return MAX_TICKETS; }
}

function loadCoins() {
  try { return Math.min(parseInt(localStorage.getItem(SK_COINS)||'0'), MAX_COINS); } catch(e){ return 0; }
}
function saveCoins(n) { try{ localStorage.setItem(SK_COINS, n); }catch(e){} }
function saveTickets(n) { try{ localStorage.setItem(SK_COUNT, n); }catch(e){} }
function saveFound() { try{ localStorage.setItem(SK_FOUND, JSON.stringify([...found])); }catch(e){} }

let tickets = loadState();
let coins   = loadCoins();

// ── Coin UI ──
function renderCoins() {
  const dotsEl  = document.getElementById('coinDots');
  const countEl = document.getElementById('coinCount');
  const hintEl  = document.getElementById('coinHint');
  if (!dotsEl) return;
  dotsEl.innerHTML = '';
  for (let i=0; i<MAX_COINS; i++) {
    const d = document.createElement('span');
    d.className = 'coin-dot' + (i < coins ? ' filled' : '');
    dotsEl.appendChild(d);
  }
  countEl.textContent = `${coins}/${MAX_COINS}`;
  if (coins >= MAX_COINS) {
    hintEl.textContent = '⚡ 次はレア確定！';
    hintEl.style.color = '#f5c842';
  } else {
    hintEl.textContent = `あと${MAX_COINS - coins}枚でレア確定`;
    hintEl.style.color = '';
  }
}

// ── Ticket UI ──
function renderTickets() {
  const ic  = document.getElementById('ticketIcons');
  const cd  = document.getElementById('ticketCountdown');
  const btn = document.getElementById('gachaBtn');
  const lbl = document.getElementById('btnLabel');
  ic.innerHTML = '';
  for (let i=0; i<MAX_TICKETS; i++) {
    const span = document.createElement('span');
    span.className = 'ticket-icon' + (i >= tickets ? ' used' : '');
    span.textContent = '🔍';
    ic.appendChild(span);
  }
  if (tickets <= 0) {
    btn.disabled = true;
    lbl.textContent = '明日また探索しよう！';
    btn.querySelector('.btn-icon').textContent = '🌙';
    startCountdown(cd);
  } else {
    btn.disabled = false;
    lbl.textContent = '探索する';
    btn.querySelector('.btn-icon').textContent = '🔍';
    cd.textContent = `残り ${tickets}回`;
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  }
}

let countdownTimer = null;
function startCountdown(el) {
  if (countdownTimer) clearInterval(countdownTimer);
  function update() {
    const now = new Date(), midnight = new Date(now);
    midnight.setHours(24,0,0,0);
    const diff = midnight - now;
    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
    el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  update(); countdownTimer = setInterval(update, 1000);
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast';
  void t.offsetWidth;
  t.className = 'toast show';
  setTimeout(() => { t.className = 'toast'; }, 1800);
}

// ── ★5 SSR演出 ──
function playSSR(yokai) {
  return new Promise(resolve => {
    const overlay = document.getElementById('ssrOverlay');
    const textEl  = document.getElementById('ssrText');
    textEl.textContent = yokai.emoji + '  ' + yokai.name;
    overlay.style.display = 'flex';
    // 画面揺れ
    const wrapper = document.querySelector('.wrapper');
    wrapper.classList.add('ssr-shake');
    setTimeout(() => wrapper.classList.remove('ssr-shake'), 600);
    // 連続パーティクル
    for (let i=0; i<4; i++) setTimeout(() => spawnParticles(5), i*250);
    // オーバーレイ消去・アニメリセット
    setTimeout(() => {
      overlay.style.display = 'none';
      overlay.querySelectorAll('*').forEach(el => {
        el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
      });
      resolve();
    }, 1500);
  });
}

  if (!currentYokai) return;
  const y = currentYokai;
  const rarityLabel = y.rarity===5?'【伝説】':y.rarity===4?'【激レア】':y.rarity===3?'【レア】':'';
  const text = `🎋宮城妖怪図鑑🎋\n「${y.name}」を発見！\n${y.stars} ${rarityLabel}\n\n発見数：${found.size} / ${TOTAL} 体\n\n#宮城妖怪図鑑 #宮城`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(location.href)}`, '_blank');
}

// ── Tabs ──
function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['all','r5','r4','r3','r12'][i] === tab);
  });
  document.querySelectorAll('.collection-item').forEach(el => {
    const r = parseInt(el.dataset.rarity);
    let show = true;
    if (tab==='r5') show=r===5;
    else if (tab==='r4') show=r===4;
    else if (tab==='r3') show=r===3;
    else if (tab==='r12') show=r<=2;
    el.style.display = show ? '' : 'none';
  });
}

// ── Init grid ──
function initGrid() {
  const grid = document.getElementById('collectionGrid');
  YOKAI.forEach(y => {
    const item = document.createElement('div');
    item.className = 'collection-item' + (found.has(y.id) ? ' found r'+y.rarity : '');
    item.id = 'col-' + y.id;
    item.dataset.rarity = y.rarity;
    item.innerHTML = `<span class="col-emoji">${y.emoji}</span><span class="col-name">${y.name}</span><span class="col-stars">${y.stars}</span>`;
    grid.appendChild(item);
  });
}

// ── Progress ──
function updateProgress() {
  const n = found.size;
  document.getElementById('progressCount').textContent = `${n} / ${TOTAL}`;
  document.getElementById('progressFill').style.width = (n / TOTAL * 100) + '%';
}

// ── Weighted random（レア確定対応）──
function pickYokai(guaranteedRare) {
  const pool = guaranteedRare ? YOKAI.filter(y => y.rarity >= 3) : YOKAI;
  const src  = pool.length ? pool : YOKAI;
  const total = src.reduce((s,y) => s+y.weight, 0);
  let r = Math.random() * total;
  for (const y of src) { r -= y.weight; if (r<=0) return y; }
  return src[src.length-1];
}

// ── Particles ──
function spawnParticles(rarity) {
  const btn = document.getElementById('gachaBtn');
  const rect = btn.getBoundingClientRect();
  const cx = rect.left+rect.width/2, cy = rect.top+rect.height/2;
  const palettes = {5:['#f5c842','#c9902a','#fff8dc','#ffd700'],4:['#a78bfa','#8b5cf6','#ddd6fe','#fff'],3:['#f39c12','#e67e22','#fde68a','#fff'],2:['#7ec850','#4a7c2f','#d4f4a4'],1:['#9ca3af','#e5e7eb','#fff']};
  const colors = palettes[rarity]||palettes[1];
  const count = rarity>=4?24:rarity===3?16:8;
  for (let i=0;i<count;i++) {
    const p = document.createElement('div'); p.className='particle';
    const size=Math.random()*9+4, angle=Math.random()*360, dist=Math.random()*160+60;
    const tx=Math.cos(angle*Math.PI/180)*dist, ty=Math.sin(angle*Math.PI/180)*dist-70;
    p.style.cssText=`width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${cx}px;top:${cy}px;--tx:${tx}px;--ty:${ty}px;animation-duration:${0.6+Math.random()*0.5}s;animation-delay:${Math.random()*0.12}s;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1400);
  }
}

// ── Gacha（メイン） ──
async function doGacha() {
  if (isAnimating || tickets <= 0) {
    if (tickets <= 0) {
      const tb = document.getElementById('ticketBar');
      tb.classList.add('shake'); setTimeout(()=>tb.classList.remove('shake'),400);
    }
    return;
  }
  isAnimating = true;

  // レア確定チェック
  const isGuaranteed = coins >= MAX_COINS;
  const yokai = pickYokai(isGuaranteed);
  const isNew = !found.has(yokai.id);

  // コイン処理
  if (isGuaranteed) {
    coins = 0; saveCoins(0); renderCoins();
  } else if (!isNew) {
    coins = Math.min(coins + 1, MAX_COINS);
    saveCoins(coins); renderCoins();
    setTimeout(() => {
      showToast(coins >= MAX_COINS
        ? `🪙 コイン満タン！\n次回レア確定！`
        : `🪙 被りコイン +1（${coins}/${MAX_COINS}）`);
    }, 600);
  }

  // チケット消費
  tickets--; saveTickets(tickets); renderTickets();

  const btn = document.getElementById('gachaBtn'), card = document.getElementById('card');
  btn.classList.add('pulsing');
  const shimmer = document.createElement('div'); shimmer.className='shimmer-bar'; btn.appendChild(shimmer);
  setTimeout(()=>{ btn.classList.remove('pulsing'); shimmer.remove(); },600);

  // ★5 SSR演出（先行再生）
  if (yokai.rarity === 5) {
    await new Promise(r => setTimeout(r, 80));
    await playSSR(yokai);
  }

  setTimeout(()=>{
    // BUG FIX: rarity-N クラスを正しく設定
    card.className = 'card rarity-' + yokai.rarity;
    card.style.animationName='none'; void card.offsetWidth; card.style.animationName='';
    card.classList.add('animating');

    document.getElementById('idleContent').style.display='none';
    document.getElementById('yokaiContent').classList.add('visible');
    document.getElementById('yokaiEmoji').textContent = yokai.emoji;
    document.getElementById('yokaiName').textContent  = yokai.name;
    document.getElementById('yokaiFeature').textContent = yokai.feature;

    const rarityColor = {5:'#c9902a',4:'#8b5cf6',3:'#e67e22',2:'#4a7c2f',1:'#6b7280'};
    const re = document.getElementById('yokaiRarity');
    re.textContent = yokai.stars + (isGuaranteed ? ' ⚡確定⚡' : '');
    re.style.color  = rarityColor[yokai.rarity] || '#6b7280';
    re.className = 'yokai-rarity'; void re.offsetWidth; re.className = 'yokai-rarity animate';

    const avatar = document.getElementById('yokaiAvatar');
    const oldB = avatar.querySelector('.new-badge'); if(oldB) oldB.remove();
    if(isNew){ const b=document.createElement('span'); b.className='new-badge'; b.textContent='NEW!'; avatar.appendChild(b); }

    currentYokai = yokai;
    spawnParticles(yokai.rarity);

    if(isNew){
      found.add(yokai.id); updateProgress(); saveFound();
      const col = document.getElementById('col-'+yokai.id);
      if(col){ col.classList.add('found','r'+yokai.rarity); col.style.animation='collectionPop 0.5s 0.3s cubic-bezier(.34,1.56,.64,1) both'; }
    }

    if(found.size===TOTAL){
      setTimeout(()=>{
        const banner=document.getElementById('allFoundBanner');
        banner.style.display='none'; void banner.offsetWidth;
        banner.style.display='block'; banner.classList.add('visible');
      },400);
    }
    setTimeout(()=>{ card.classList.remove('animating'); isAnimating=false; },600);
  }, yokai.rarity===5 ? 60 : 80);
}

// ── Boot ──
initGrid();
updateProgress();
renderTickets();
renderCoins();


</script>
